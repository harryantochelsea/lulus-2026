<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pengumuman Kelulusan SMP Islam Sudirman Juwangi</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: linear-gradient(to bottom right, #0f172a, #1e293b);
      min-height: 100vh;
    }

    .glass {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
    }
  </style>
</head>

<body class="text-white flex items-center justify-center p-4">

  <div class="glass max-w-2xl w-full rounded-3xl p-8 shadow-2xl">

    <div class="text-center mb-8">
      <h1 class="text-3xl md:text-4xl font-bold">
        PENGUMUMAN KELULUSAN
      </h1>

      <h2 class="text-xl mt-2 font-semibold text-yellow-300">
        SMP ISLAM SUDIRMAN JUWANGI
      </h2>

      <p class="mt-2 text-gray-300">
        Tahun Pelajaran 2025/2026
      </p>
    </div>

    <!-- FORM -->
    <div class="mb-6">
      <label class="block mb-2 text-sm">
        Masukkan NISN
      </label>

      <div class="flex gap-2">
        <input
          type="text"
          id="nisn"
          placeholder="Contoh: 0098982038"
          class="w-full px-4 py-3 rounded-xl text-black focus:outline-none"
        />

        <button
          onclick="cekKelulusan()"
          class="bg-green-500 hover:bg-green-600 px-6 py-3 rounded-xl font-semibold"
        >
          CEK
        </button>
      </div>
    </div>

    <!-- HASIL -->
    <div id="hasil" class="hidden mt-6">

      <div class="bg-white text-black rounded-2xl p-6">

        <div class="text-center mb-6">
          <h3 class="text-2xl font-bold text-green-600">
            SELAMAT!
          </h3>

          <p class="text-gray-700">
            Anda dinyatakan
          </p>

          <div id="status"
               class="text-3xl font-bold mt-2">
          </div>
        </div>

        <div class="space-y-3">

          <div class="flex justify-between border-b pb-2">
            <span class="font-semibold">Nama</span>
            <span id="nama"></span>
          </div>

          <div class="flex justify-between border-b pb-2">
            <span class="font-semibold">NISN</span>
            <span id="nisnHasil"></span>
          </div>

          <div class="flex justify-between border-b pb-2">
            <span class="font-semibold">Tempat, Tanggal Lahir</span>
            <span id="ttl"></span>
          </div>

          <div class="flex justify-between border-b pb-2">
            <span class="font-semibold">Kelas</span>
            <span id="kelas"></span>
          </div>

        </div>

        <div class="mt-8 text-center">
          <a
            id="downloadBtn"
            href="#"
            target="_blank"
            class="inline-block bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-semibold"
          >
            Download SKL
          </a>
        </div>

      </div>
    </div>

    <!-- TIDAK DITEMUKAN -->
    <div id="notfound"
         class="hidden bg-red-500/20 border border-red-500 rounded-xl p-4 mt-6 text-center">
      Data tidak ditemukan.
    </div>

  </div>

  <script>
    const csvUrl =
      "https://docs.google.com/spreadsheets/d/e/2PACX-1vTNK2AexV5RQ77JeqE7ycdaoILWUcQhu_a9Tnj3k1BbxzfpRFmgFc721-3jvJmePBRyEQUKs3-EVSsh/pub?output=csv";

    let dataSiswa = [];

    async function loadData() {
      const response = await fetch(csvUrl);
      const text = await response.text();

      const rows = text.split("\n").map(row => row.split(","));

      const headers = rows[0].map(h => h.trim());

      dataSiswa = rows.slice(1).map(row => {
        let obj = {};
        headers.forEach((header, i) => {
          obj[header] = row[i] ? row[i].trim() : "";
        });
        return obj;
      });
    }

    async function cekKelulusan() {

      if (dataSiswa.length === 0) {
        await loadData();
      }

      const nisnInput =
        document.getElementById("nisn").value.trim();

      const siswa = dataSiswa.find(
        s => s.NISN === nisnInput
      );

      document.getElementById("hasil").classList.add("hidden");
      document.getElementById("notfound").classList.add("hidden");

      if (siswa) {

        document.getElementById("hasil")
          .classList.remove("hidden");

        document.getElementById("nama").innerText =
          siswa.NAMA || "-";

        document.getElementById("nisnHasil").innerText =
          siswa.NISN || "-";

        document.getElementById("ttl").innerText =
          (siswa["TEMPAT LAHIR"] || "") +
          ", " +
          (siswa["TANGGAL LAHIR"] || "");

        document.getElementById("kelas").innerText =
          siswa.KELAS || "-";

        document.getElementById("status").innerText =
          siswa.STATUS || "LULUS";

        // LINK SKL GOOGLE DRIVE
        document.getElementById("downloadBtn").href =
          siswa.SKL || "#";

      } else {

        document.getElementById("notfound")
          .classList.remove("hidden");
      }
    }
  </script>

</body>
</html>
